specVersion: 1.2.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GuestBook
    network: base-sepolia
    source:
      address: "0x168082De64B1aB47a19023CC55F710dA11C27158"
      abi: GuestBook
      startBlock: 43462739
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - MessagePosted
      abis:
        - name: GuestBook
          file: ./abis/GuestBook.json
      eventHandlers:
        - event: MessagePosted(indexed address,string)
          handler: handleMessagePosted
      file: ./src/guest-book.ts
